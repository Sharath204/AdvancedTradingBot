<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Telegram Market Analysis Bot - Web Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #eee;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .results.active {
            display: block;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-weight: 600;
            color: #666;
        }

        .metric-value {
            color: #667eea;
            font-weight: 700;
        }

        .confidence-bar {
            width: 100%;
            height: 30px;
            background: #eee;
            border-radius: 15px;
            margin: 10px 0;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.9em;
            transition: width 0.3s;
        }

        .signal-bullish {
            color: #4caf50;
            font-weight: 700;
        }

        .signal-bearish {
            color: #f44336;
            font-weight: 700;
        }

        .signal-neutral {
            color: #ff9800;
            font-weight: 700;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .alert.active {
            display: block;
        }

        .alert.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .alert.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .support-resistance {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .sr-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
        }

        .sr-box h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .sr-level {
            padding: 5px 0;
            font-size: 0.9em;
            color: #333;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
        }

        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Market Analysis Bot</h1>
            <p>Real-time Technical Analysis with Multi-Timeframe Indicators</p>
        </div>

        <div class="grid">
            <!-- Analysis Card -->
            <div class="card">
                <h2>🔍 Market Analysis</h2>
                <div class="form-group">
                    <label for="symbol">Trading Symbol</label>
                    <input type="text" id="symbol" placeholder="e.g., BTC/USDT or BTC" value="BTC/USDT">
                </div>
                <button onclick="analyze()">Analyze Market</button>
                <div class="loading" id="analysisLoading">
                    <div class="spinner"></div>
                    <p>Analyzing...</p>
                </div>
                <div class="alert" id="analysisAlert"></div>
                <div class="results" id="analysisResults"></div>
            </div>

            <!-- Backtesting Card -->
            <div class="card">
                <h2>📈 Backtesting</h2>
                <div class="form-group">
                    <label for="btSymbol">Symbol</label>
                    <input type="text" id="btSymbol" placeholder="e.g., BTC/USDT" value="BTC/USDT">
                </div>
                <div class="two-column">
                    <div class="form-group">
                        <label for="btDays">Days</label>
                        <input type="number" id="btDays" min="1" max="365" value="30">
                    </div>
                    <div class="form-group">
                        <label for="btStrategy">Strategy</label>
                        <select id="btStrategy">
                            <option value="ema">EMA Crossover</option>
                            <option value="rsi">RSI Mean Reversion</option>
                        </select>
                    </div>
                </div>
                <button onclick="runBacktest()">Run Backtest</button>
                <div class="loading" id="backtestLoading">
                    <div class="spinner"></div>
                    <p>Running backtest...</p>
                </div>
                <div class="alert" id="backtestAlert"></div>
                <div class="results" id="backtestResults"></div>
            </div>

            <!-- Statistics Card -->
            <div class="card">
                <h2>📊 Statistics</h2>
                <div class="form-group">
                    <label for="statSymbol">Symbol</label>
                    <input type="text" id="statSymbol" placeholder="e.g., BTC/USDT" value="BTC/USDT">
                </div>
                <button onclick="getStatistics()">Get Statistics</button>
                <div class="alert" id="statsAlert"></div>
                <div class="results" id="statsResults"></div>
            </div>

            <!-- Configuration Card -->
            <div class="card">
                <h2>⚙️ Configuration</h2>
                <button onclick="loadConfig()">Load Configuration</button>
                <div class="alert" id="configAlert"></div>
                <div class="results" id="configResults"></div>
            </div>
        </div>

        <div class="footer">
            <p>🤖 Telegram Market Analysis Bot v1.0.0</p>
            <p>Real-time market analysis with advanced technical indicators</p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        async function analyze() {
            const symbol = document.getElementById('symbol').value.trim();
            if (!symbol) {
                showAlert('analysisAlert', 'Please enter a symbol', 'error');
                return;
            }

            showLoading('analysisLoading', true);
            try {
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol })
                });

                const data = await response.json();
                if (data.status === 'success') {
                    displayAnalysisResults(data);
                    showAlert('analysisAlert', 'Analysis completed successfully', 'success');
                } else {
                    showAlert('analysisAlert', data.message || 'Analysis failed', 'error');
                }
            } catch (error) {
                showAlert('analysisAlert', `Error: ${error.message}`, 'error');
                console.error(error);
            } finally {
                showLoading('analysisLoading', false);
            }
        }

        async function runBacktest() {
            const symbol = document.getElementById('btSymbol').value.trim();
            const days = parseInt(document.getElementById('btDays').value);
            const strategy = document.getElementById('btStrategy').value;

            if (!symbol || days < 1) {
                showAlert('backtestAlert', 'Please fill all fields', 'error');
                return;
            }

            showLoading('backtestLoading', true);
            try {
                const response = await fetch(`${API_URL}/backtest`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol, days, strategy })
                });

                const data = await response.json();
                if (data.status === 'success') {
                    displayBacktestResults(data);
                    showAlert('backtestAlert', 'Backtest completed', 'success');
                } else {
                    showAlert('backtestAlert', data.message || 'Backtest failed', 'error');
                }
            } catch (error) {
                showAlert('backtestAlert', `Error: ${error.message}`, 'error');
                console.error(error);
            } finally {
                showLoading('backtestLoading', false);
            }
        }

        async function getStatistics() {
            const symbol = document.getElementById('statSymbol').value.trim();
            if (!symbol) {
                showAlert('statsAlert', 'Please enter a symbol', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/statistics/${symbol}`);
                const data = await response.json();
                if (data.status === 'success') {
                    displayStatistics(data);
                    showAlert('statsAlert', 'Statistics loaded', 'success');
                } else {
                    showAlert('statsAlert', data.message || 'Failed to load statistics', 'error');
                }
            } catch (error) {
                showAlert('statsAlert', `Error: ${error.message}`, 'error');
                console.error(error);
            }
        }

        async function loadConfig() {
            try {
                const response = await fetch(`${API_URL}/config`);
                const data = await response.json();
                if (data.status === 'success') {
                    displayConfig(data);
                    showAlert('configAlert', 'Configuration loaded', 'success');
                }
            } catch (error) {
                showAlert('configAlert', `Error: ${error.message}`, 'error');
                console.error(error);
            }
        }

        function displayAnalysisResults(data) {
            const resultsDiv = document.getElementById('analysisResults');
            const confidence = data.confidence.overall_confidence;
            const trend = data.analysis.trend;
            const trendText = trend.trend || 'N/A';
            const trendClass = `signal-${trendText.toLowerCase()}`;
            const confidenceWidth = Math.min(confidence, 100);

            let html = `
                <div class="metric">
                    <span class="metric-label">Symbol:</span>
                    <span class="metric-value">${data.symbol}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Confidence Score:</span>
                    <span class="metric-value">${confidence}%</span>
                </div>
                <div class="confidence-bar">
                    <div class="confidence-fill" style="width: ${confidenceWidth}%">${confidence}%</div>
                </div>
                <div class="metric">
                    <span class="metric-label">Trend:</span>
                    <span class="metric-value ${trendClass}">${trendText.toUpperCase()}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">RSI (15m):</span>
                    <span class="metric-value">${trend.rsi?.toFixed(2) || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Price:</span>
                    <span class="metric-value">$${trend.current_price?.toFixed(2) || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">EMA 20:</span>
                    <span class="metric-value">$${trend.ema_20?.toFixed(2) || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">EMA 50:</span>
                    <span class="metric-value">$${trend.ema_50?.toFixed(2) || 'N/A'}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">EMA 200:</span>
                    <span class="metric-value">$${trend.ema_200?.toFixed(2) || 'N/A'}</span>
                </div>
            `;

            // Support & Resistance
            const sr = data.support_resistance;
            if (sr.supports.length > 0 || sr.resistances.length > 0) {
                html += `<div class="support-resistance">`;
                if (sr.supports.length > 0) {
                    html += `<div class="sr-box"><h4>Support Levels</h4>`;
                    sr.supports.slice(0, 3).forEach(s => {
                        html += `<div class="sr-level">$${s.toFixed(2)}</div>`;
                    });
                    html += `</div>`;
                }
                if (sr.resistances.length > 0) {
                    html += `<div class="sr-box"><h4>Resistance Levels</h4>`;
                    sr.resistances.slice(0, 3).forEach(r => {
                        html += `<div class="sr-level">$${r.toFixed(2)}</div>`;
                    });
                    html += `</div>`;
                }
                html += `</div>`;
            }

            resultsDiv.innerHTML = html;
            resultsDiv.classList.add('active');
        }

        function displayBacktestResults(data) {
            const resultsDiv = document.getElementById('backtestResults');
            const perf = data.results.performance;

            let html = `
                <div class="metric">
                    <span class="metric-label">Strategy:</span>
                    <span class="metric-value">${data.results.strategy}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Period:</span>
                    <span class="metric-value">${data.results.candles} candles</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Strategy Return:</span>
                    <span class="metric-value" style="color: ${perf.total_return >= 0 ? '#4caf50' : '#f44336'}">${perf.total_return}%</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Buy & Hold Return:</span>
                    <span class="metric-value">${perf.buy_hold_return}%</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Sharpe Ratio:</span>
                    <span class="metric-value">${perf.sharpe_ratio}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Max Drawdown:</span>
                    <span class="metric-value" style="color: #f44336">${perf.max_drawdown}%</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Total Trades:</span>
                    <span class="metric-value">${perf.num_trades}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Win Rate:</span>
                    <span class="metric-value">${perf.win_rate}%</span>
                </div>
            `;

            resultsDiv.innerHTML = html;
            resultsDiv.classList.add('active');
        }

        function displayStatistics(data) {
            const resultsDiv = document.getElementById('statsResults');
            const stats = data.statistics;

            let html = `
                <div class="metric">
                    <span class="metric-label">Total Trades:</span>
                    <span class="metric-value">${stats.total_trades}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Winning Trades:</span>
                    <span class="metric-value" style="color: #4caf50">${stats.winning_trades}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Losing Trades:</span>
                    <span class="metric-value" style="color: #f44336">${stats.losing_trades}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Win Rate:</span>
                    <span class="metric-value">${stats.win_rate}%</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Total PnL:</span>
                    <span class="metric-value" style="color: ${stats.total_pnl >= 0 ? '#4caf50' : '#f44336'}">${stats.total_pnl}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Avg Confidence:</span>
                    <span class="metric-value">${stats.avg_confidence}%</span>
                </div>
            `;

            resultsDiv.innerHTML = html;
            resultsDiv.classList.add('active');
        }

        function displayConfig(data) {
            const resultsDiv = document.getElementById('configResults');
            const config = data.config;

            let html = `
                <div class="metric">
                    <span class="metric-label">Available Symbols:</span>
                    <span class="metric-value">${config.symbols.slice(0, 3).join(', ')}...</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Timeframes:</span>
                    <span class="metric-value">${config.timeframes.join(', ')}</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Update Interval:</span>
                    <span class="metric-value">${config.update_interval} seconds</span>
                </div>
            `;

            resultsDiv.innerHTML = html;
            resultsDiv.classList.add('active');
        }

        function showLoading(elementId, show) {
            const element = document.getElementById(elementId);
            if (show) {
                element.classList.add('active');
            } else {
                element.classList.remove('active');
            }
        }

        function showAlert(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `alert active ${type}`;
            setTimeout(() => {
                element.classList.remove('active');
            }, 5000);
        }

        // Load config on page load
        window.addEventListener('load', () => {
            loadConfig();
        });
    </script>
</body>
</html>
